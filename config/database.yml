default: &default
  adapter: postgresql
  encoding: unicode
  username: postgres
  password: password
  host: db # Docker Compose内で定義したPostgreSQLサービス名
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: app_development

test:
  <<: *default
  database: app_test

production:
  <<: *default
  database: app_production
