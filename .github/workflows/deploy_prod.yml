name: deploy_prod

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
          - name: Deploy to circle-book-web-server3
            uses: appleboy/ssh-action@master
            with:
              host: ${{ secrets.DEPLOY_HOST1 }}
              username: ${{ secrets.DEPLOY_USER }}
              port: ${{ secrets.DEPLOY_PORT }}
              key: ${{ secrets.DEPLOY_KEY }}
              script: |
                cd ${{ secrets.DEPLOY_DIR }}
                git pull origin master
                npm install --prefix . 2>/dev/null || true
                ~/.rbenv/shims/bundle exec rake assets:precompile RAILS_ENV=production
                kill -USR2 $(cat tmp/pids/unicorn.pid)
          - name: Deploy to circle-book-web-server2
            uses: appleboy/ssh-action@master
            with:
              host: ${{ secrets.DEPLOY_HOST2 }}
              username: ${{ secrets.DEPLOY_USER }}
              port: ${{ secrets.DEPLOY_PORT }}
              key: ${{ secrets.DEPLOY_KEY }}
              script: |
                cd ${{ secrets.DEPLOY_DIR }}
                git pull origin master
                npm install --prefix . 2>/dev/null || true
                ~/.rbenv/shims/bundle exec rake assets:precompile RAILS_ENV=production
                kill -USR2 $(cat tmp/pids/unicorn.pid)
